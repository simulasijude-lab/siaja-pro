<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Siswa - SiAJa Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #2196F3, #1565C0); }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #2196F3; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #1976D2; }
        .error { color: red; text-align: center; margin-top: 10px; display: none; }
        .back-link { text-align: center; margin-top: 15px; }
        .back-link a { color: #2196F3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>👨‍🎓 Login Siswa</h2>
        <p class="subtitle">Gunakan akun yang diberikan oleh Guru</p>
        <div id="errorMsg" class="error"></div>
        <div class="form-group">
            <label>Username / Email</label>
            <input type="text" id="email" placeholder="Masukkan username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password">
        </div>
        <button onclick="login()"><i class="fas fa-sign-in-alt"></i> Masuk</button>
        <div class="back-link">
            <a href="index.html">← Kembali</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorMsg').style.display = 'block';
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) return showError('Username dan password harus diisi!');
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                showError('❌ Login gagal: ' + error.message);
                return;
            }
            
            // Simpan ke localStorage untuk digunakan di siswa.html
            localStorage.setItem('siswa_session', JSON.stringify(data.session));
            window.location.href = 'siswa.html';
        }
    </script>
</body>
</html>
