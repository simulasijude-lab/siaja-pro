<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiAJa Pro - Sistem Ujian Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            max-width: 450px; 
            width: 90%; 
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 28px; }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 15px 0; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.3s; 
            color: white; 
        }
        .btn-guru { background: #4CAF50; }
        .btn-guru:hover { background: #45a049; }
        .btn-siswa { background: #2196F3; }
        .btn-siswa:hover { background: #1976D2; }
        .btn-admin { background: #FF9800; }
        .btn-admin:hover { background: #F57C00; }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 SiAJa Pro</h1>
        <p style="text-align:center; color:#666; margin-bottom:20px;">Sistem Ujian Online Terintegrasi</p>
        <button class="btn btn-guru" onclick="window.location.href='guru.html'">👨‍🏫 Login Guru</button>
        <button class="btn btn-siswa" onclick="window.location.href='siswa.html'">👨‍🎓 Login Siswa</button>
        <div class="footer">MTsN 2 Bolaang Mongondow Timur</div>
    </div>
</body>
</html>
